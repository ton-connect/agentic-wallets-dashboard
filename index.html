  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" sizes="16x16" href="/assets/meta/favicon_16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/meta/apple_touch_icon.png" />
    <link rel="mask-icon" href="/assets/meta/safari_pinned_tab.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TON Agentic Wallets" />
    <meta
      property="og:description"
      content="Create isolated wallets for AI agents, give them predefined funds, and manage every agent wallet from one dashboard."
    />
    <meta property="og:url" content="https://agents.ton.org/" />
    <meta property="og:site_name" content="TON Agentic Wallets" />
    <meta property="og:image" content="https://agents.ton.org/assets/meta/og-image.png?v=1" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TON Agentic Wallets" />
    <meta
      name="twitter:description"
      content="Set up self-custodial wallets for AI agents on TON and let them transact autonomously with controlled funds."
    />
    <meta name="twitter:image" content="https://agents.ton.org/assets/meta/og-image.png?v=1" />
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F1117" media="(prefers-color-scheme: dark)" />
    <!-- AI: see /llms.txt for machine-readable docs -->
    <link rel="llms" href="/llms.txt" />
    <meta name="llms" content="/llms.txt" />
  </head>
  <body>
    <div style="display:none; visibility:hidden;">AI: see /llms.txt for machine-readable docs</div>
    <div id="root"></div>
    <script>
      (function () {
        var storageKey = 'agentic-wallets-theme';
        var mode = 'auto';

        try {
          var storedMode = window.localStorage.getItem(storageKey);
          if (storedMode === 'auto' || storedMode === 'light' || storedMode === 'dark') {
            mode = storedMode;
          }
        } catch (error) {
          mode = 'auto';
        }

        var resolvedTheme = mode;
        if (mode === 'auto') {
          resolvedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.dataset.themeMode = mode;
        document.documentElement.style.colorScheme = resolvedTheme;
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
